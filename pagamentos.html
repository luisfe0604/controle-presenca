<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Controle de Pagamentos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html">Alunos</a>
      <a href="presenca.html">Presença</a>
      <a href="pagamentos.html">Pagamentos</a>
      <a id="logout">Sair</a>
    </nav>

    <h1 style="display: flex; justify-content: space-between">
      Pagamentos Mensais
      <span id="totalMensal">R$ 0,00</span>
    </h1>

    <form class="filtro">
      <label for="mesPagamento">Mês:</label>
      <input type="month" id="mesPagamento" />
    </form>

    <ul id="listaPagamentos"></ul>

    <label id="label-export">
      <button id="exportarPagamentos">Exportar Pagamentos</button>
    </label>

    <script>
      const mesInputInit = document.getElementById("mesPagamento");
      mesInputInit.value = new Date().toISOString().slice(0, 7);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="pagamentos.js"></script>

    <script>
      supaBase.auth.getSession().then(({ data }) => {
        if (!data.session) {
          window.location.href = "login.html";
        }
      });
    </script>

    <script>
      document.getElementById("logout").addEventListener("click", async () => {
        const confirmar = confirm("Deseja realmente sair?");
        if (!confirmar) return;

        const { error } = await supabaseClient.auth.signOut();

        if (error) {
          alert("Erro ao sair");
          return;
        }

        window.location.href = "login.html";
      });
    </script>
  </body>
</html>
